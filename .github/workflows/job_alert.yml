name: Indeed Tech Jobs Alert

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes
  workflow_dispatch:           # Manual trigger for testing

jobs:
  search-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore previous job list
        uses: actions/cache@v3
        with:
          path: seen_jobs.json
          key: indeed-seen-jobs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 bot.py

      - name: Save job list for next run
        uses: actions/cache@v3
        with:
          path: seen_jobs.json
          key: indeed-seen-jobs
```

---

## Step 6 — Create `Procfile` (for hosting)

Create a file called **`Procfile`** (no extension):
```
worker: python3 cron.py
```

---

## Your final folder looks like:
```
indeed-telegram-bot/
├── .github/
│   └── workflows/
│       └── job_alert.yml          ← GitHub Actions config
├── bot.py                         ← Main script
├── cron.py                        ← Runs bot every 30 mins
├── requirements.txt               ← Python libraries
├── Procfile                       ← For hosting
└── seen_jobs.json                 ← Auto-created, don't edit